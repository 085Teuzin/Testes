<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded, remove, onDisconnect, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomID = "130426";
        const myID = Math.random().toString(36).substring(7);
        
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(servers);
        let localStream;

        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const muteBtn = document.getElementById('muteBtn');
        const chatContainer = document.getElementById('chatContainer');
        const chatNotify = document.getElementById('chatNotify');
        let chatOpen = false;

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                
                pc.ontrack = (event) => {
                    const remoteAudio = document.getElementById('remoteAudio');
                    remoteAudio.srcObject = event.streams[0];
                };

                setupPresence();
                startCall();
                setupChat();
            } catch (e) { 
                statusText.innerText = "Erro: Permita o microfone"; 
            }
        }

        function setupPresence() {
            const myPresenceRef = ref(db, `calls/${roomID}/presence/${myID}`);
            const allPresenceRef = ref(db, `calls/${roomID}/presence`);

            set(myPresenceRef, { status: "online", id: myID });
            onDisconnect(myPresenceRef).remove();

            document.addEventListener("visibilitychange", () => {
                set(myPresenceRef, { status: document.hidden ? "away" : "online", id: myID });
            });

            onValue(allPresenceRef, (snap) => {
                const users = snap.val() || {};
                const partner = Object.values(users).find(u => u.id !== myID);

                if (!partner) {
                    statusLed.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                    statusText.innerText = "Par Offline";
                } else {
                    const isAway = partner.status === "away";
                    statusLed.className = `w-3 h-3 rounded-full ${isAway ? 'bg-yellow-500 shadow-[0_0_8px_#eab308]' : 'bg-green-500 shadow-[0_0_8px_#22c55e]'}`;
                    statusText.innerText = isAway ? "Par AFK" : "Par Online";
                }
            });
        }

        async function startCall() {
            const callRef = ref(db, `calls/${roomID}/signal`);
            const offerCandidates = ref(db, `calls/${roomID}/candidates/offer`);
            const answerCandidates = ref(db, `calls/${roomID}/candidates/answer`);

            const snap = await get(callRef);
            const data = snap.val();

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    const cRef = !pc.remoteDescription ? offerCandidates : answerCandidates;
                    push(cRef, e.candidate.toJSON());
                }
            };

            if (!data) {
                // Criar Oferta (Sou o primeiro)
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await set(callRef, { offer: { type: offer.type, sdp: offer.sdp } });

                onValue(callRef, (s) => {
                    const val = s.val();
                    if (val?.answer && !pc.currentRemoteDescription) {
                        pc.setRemoteDescription(new RTCSessionDescription(val.answer));
                    }
                });

                onChildAdded(answerCandidates, (s) => {
                    pc.addIceCandidate(new RTCIceCandidate(s.val()));
                });
            } else {
                // Responder Oferta (Sou o segundo)
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await set(ref(db, `calls/${roomID}/signal/answer`), { type: answer.type, sdp: answer.sdp });

                onChildAdded(offerCandidates, (s) => {
                    pc.addIceCandidate(new RTCIceCandidate(s.val()));
                });
            }
        }

        function setupChat() {
            const chatRef = ref(db, `calls/${roomID}/chat`);
            document.getElementById('sendMsg').onclick = () => {
                const input = document.getElementById('chatInput');
                if (input.value.trim()) {
                    push(chatRef, { user: myID, msg: input.value });
                    input.value = "";
                }
            };

            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = `p-2 rounded-lg mb-2 text-xs w-fit max-w-[90%] break-all ${data.user === myID ? 'bg-blue-600 ml-auto' : 'bg-slate-700'}`;
                div.innerText = data.msg;
                document.getElementById('chatMessages').appendChild(div);
                document.getElementById('chatMessages').scrollTop = 9999;
                if (!chatOpen) chatNotify.classList.remove('hidden');
            });
        }

        window.toggleChat = () => {
            chatOpen = !chatOpen;
            chatContainer.classList.toggle('hidden');
            chatNotify.classList.add('hidden');
        };

        muteBtn.onclick = () => {
            const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            muteBtn.innerHTML = active ? '<span>🎤</span>' : '<span>🔇</span>';
            muteBtn.className = active ? 'flex items-center justify-center p-4 rounded-2xl bg-green-600 shadow-lg' : 'flex items-center justify-center p-4 rounded-2xl bg-red-600 shadow-lg';
        };

        document.getElementById('reconnectBtn').onclick = async () => {
            await remove(ref(db, `calls/${roomID}`));
            location.reload();
        };

        init();
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass relative w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl border-b-4 border-slate-800">
        
        <div class="absolute top-6 left-8 flex items-center gap-2">
            <div id="statusLed" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] transition-all duration-500"></div>
            <span id="statusText" class="text-[10px] uppercase tracking-widest text-slate-500 font-black italic">Offline</span>
        </div>

        <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-xl shadow-blue-900/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
        </div>

        <h1 class="text-xl font-bold tracking-tight mb-8">Call Direct</h1>

        <div class="grid grid-cols-2 gap-4 w-full">
            <button id="muteBtn" class="flex items-center justify-center p-4 rounded-2xl bg-green-600 hover:scale-105 transition-all active:scale-95 shadow-lg">
                <span>🎤</span>
            </button>
            <button onclick="toggleChat()" class="relative flex items-center justify-center p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all shadow-lg">
                <span>💬</span>
                <div id="chatNotify" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden"></div>
            </button>
        </div>

        <button id="reconnectBtn" class="mt-6 w-full py-4 bg-slate-800/50 hover:bg-slate-800 text-white/70 hover:text-white rounded-2xl font-bold transition-all border border-white/5">
            Reconectar
        </button>

        <div id="chatContainer" class="hidden absolute inset-0 glass rounded-[2.5rem] p-4 flex flex-col z-10">
            <div class="flex justify-between items-center mb-4 px-2 border-b border-white/5 pb-2">
                <span class="text-[10px] font-bold text-slate-400">CHAT AO VIVO</span>
                <button onclick="toggleChat()" class="text-lg leading-none">&times;</button>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 p-2 space-y-2 scrollbar-hide"></div>
            <div class="flex gap-2">
                <input id="chatInput" type="text" placeholder="Mensagem..." class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500">
                <button id="sendMsg" class="bg-blue-600 px-4 rounded-xl text-sm">➤</button>
            </div>
        </div>
    </div>

    <div class="mt-8">
        <p class="text-slate-600 text-[10px] font-bold tracking-widest uppercase">Made By: @085_Teuzinnn</p>
    </div>

    <audio id="remoteAudio" autoplay class="hidden"></audio>
</body>
</html>
