<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soldier Game Fixed</title>
    <style>
        body { margin: 0; outline: none; background: #111; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; z-index: 10; }
        .hint { font-size: 0.8rem; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <strong>CONTROLES:</strong>
        <div class="hint">WASD: Mover | SHIFT: Correr | ESPAÇO: Pular</div>
        <div class="hint">Q: Soco | E: Chute | R: Mortal | F: Acenar</div>
    </div>
    <div id="loader">Carregando arquivo GLB...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 20, 120);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(-5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(1000, 100, 0x444444, 0x333333));

        let mixer, player, cameraPivot, cameraTarget;
        const actions = {};
        let activeAction;
        const clock = new THREE.Clock();
        const keys = {};

        const loader = new GLTFLoader();

        // IMPORTANTE: Certifique-se que o nome do arquivo abaixo é exatamente o que você tem na pasta
        loader.load('UAL1_Standard.glb', (gltf) => {
            player = gltf.scene;
            player.scale.setScalar(1); 
            
            player.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(player);

            // Setup Câmera
            cameraPivot = new THREE.Group();
            cameraPivot.position.set(0, 4, -8);
            player.add(cameraPivot);

            cameraTarget = new THREE.Group();
            cameraTarget.position.set(0, 2, 5);
            player.add(cameraTarget);

            mixer = new THREE.AnimationMixer(player);
            
            // Mapeamento inteligente de animações
            gltf.animations.forEach((clip) => {
                const rawName = clip.name.toLowerCase();
                const action = mixer.clipAction(clip);
                
                // Salva a animação original e também apelidos simplificados
                actions[rawName] = action;

                if (rawName.includes('idle')) actions['idle'] = action;
                if (rawName.includes('walk')) actions['walk'] = action;
                if (rawName.includes('run')) actions['run'] = action;
                if (rawName.includes('jump')) {
                    action.setLoop(THREE.LoopOnce);
                    action.clampWhenFinished = true;
                    actions['jump'] = action;
                }
                if (rawName.includes('punch')) { action.setLoop(THREE.LoopOnce); actions['punch'] = action; }
                if (rawName.includes('kick')) { action.setLoop(THREE.LoopOnce); actions['kick'] = action; }
                if (rawName.includes('flip')) { action.setLoop(THREE.LoopOnce); actions['flip'] = action; }
                if (rawName.includes('wave')) { action.setLoop(THREE.LoopOnce); actions['wave'] = action; }
            });

            // Play Inicial
            activeAction = actions['idle'] || Object.values(actions)[0];
            if(activeAction) activeAction.play();

            document.getElementById('loader').style.display = 'none';
            console.log("Animações carregadas:", Object.keys(actions));
        }, undefined, (err) => {
            document.getElementById('loader').innerText = "Erro ao carregar UAL1_Standard.glb";
            console.error(err);
        });

        function fadeToAction(name, duration = 0.2) {
            const nextAction = actions[name];
            if (!nextAction || activeAction === nextAction) return;
            nextAction.reset().fadeIn(duration).play();
            if(activeAction) activeAction.fadeOut(duration);
            activeAction = nextAction;
        }

        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            // Ações instantâneas
            if (e.code === 'Space') fadeToAction('jump');
            if (e.code === 'KeyQ') fadeToAction('punch');
            if (e.code === 'KeyE') fadeToAction('kick');
            if (e.code === 'KeyR') fadeToAction('flip');
            if (e.code === 'KeyF') fadeToAction('wave');
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (player) {
                const isRunning = keys['ShiftLeft'] || keys['ShiftRight'];
                const moveSpeed = isRunning ? 0.25 : 0.12;
                const rotSpeed = 0.05;

                const isMoving = keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'];

                // Só troca entre walk/run/idle se não estiver fazendo uma animação única (como soco ou pulo)
                if (activeAction && !activeAction.isRunning() || 
                    (activeAction._clip.name.toLowerCase().includes('idle') || 
                     activeAction._clip.name.toLowerCase().includes('walk') || 
                     activeAction._clip.name.toLowerCase().includes('run'))) {
                    
                    if (isMoving) {
                        fadeToAction(isRunning ? 'run' : 'walk');
                    } else {
                        fadeToAction('idle');
                    }
                }

                if (keys['KeyW']) player.translateZ(moveSpeed);
                if (keys['KeyS']) player.translateZ(-moveSpeed);
                if (keys['KeyA']) player.rotation.y += rotSpeed;
                if (keys['KeyD']) player.rotation.y -= rotSpeed;

                const goalPos = new THREE.Vector3();
                cameraPivot.getWorldPosition(goalPos);
                const lookPos = new THREE.Vector3();
                cameraTarget.getWorldPosition(lookPos);
                camera.position.lerp(goalPos, 0.1);
                camera.lookAt(lookPos);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
