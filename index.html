<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obby 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
        #level-info { position: absolute; top: 20px; right: 20px; color: gold; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">WASD: Mover | ESPAÇO: Pular</div>
    <div id="level-info">Fase: <span id="current-lvl">1</span></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FASES } from './Fases.js';

        let faseAtual = 0;
        let plataformas = [];
        let checkpointFinal = null;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun);

        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xff3333 }));
        player.castShadow = true;
        scene.add(player);

        let velocityY = 0;
        let isGrounded = false;
        const keys = {};
        const moveSpeed = 0.12;
        const jumpForce = 0.22;
        const gravity = 0.01;

        function carregarFase(index) {
            plataformas.forEach(p => scene.remove(p));
            plataformas = [];
            const dados = FASES[index];
            document.getElementById('current-lvl').innerText = index + 1;

            dados.plataformas.forEach((p, i) => {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(p.w, 0.6, p.d), new THREE.MeshStandardMaterial({ color: p.cor || 0x00ff88 }));
                mesh.position.set(p.x, p.y, p.z);
                mesh.receiveShadow = true;
                scene.add(mesh);
                plataformas.push(mesh);
                if (i === dados.plataformas.length - 1) checkpointFinal = mesh;
            });

            player.position.set(dados.plataformas[0].x, dados.plataformas[0].y + 2, dados.plataformas[0].z);
            velocityY = 0;
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (keys['KeyW']) player.position.z -= moveSpeed;
            if (keys['KeyS']) player.position.z += moveSpeed;
            if (keys['KeyA']) player.position.x -= moveSpeed;
            if (keys['KeyD']) player.position.x += moveSpeed;

            velocityY -= gravity;
            player.position.y += velocityY;

            isGrounded = false;
            const pBox = new THREE.Box3().setFromObject(player);

            plataformas.forEach(plat => {
                const platBox = new THREE.Box3().setFromObject(plat);
                if (pBox.intersectsBox(platBox) && velocityY < 0) {
                    player.position.y = plat.position.y + 0.8;
                    velocityY = 0;
                    isGrounded = true;
                    if (plat === checkpointFinal) {
                        if (faseAtual < FASES.length - 1) { faseAtual++; carregarFase(faseAtual); }
                        else { alert("FIM DE JOGO!"); faseAtual = 0; carregarFase(0); }
                    }
                }
            });

            if (keys['Space'] && isGrounded) velocityY = jumpForce;
            if (player.position.y < -15) carregarFase(faseAtual);

            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 6, player.position.z + 12), 0.1);
            camera.lookAt(player.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        carregarFase(faseAtual);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
