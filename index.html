<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quaternius Ultimate Controller</title>
    <style>
        body { margin: 0; outline: none; background: #111; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; }
        .controls-hint { font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Soldier Controller</h2>
        <div class="controls-hint">
            WASD: Mover | SHIFT: Correr | ESPAÇO: Pular<br>
            R: Mortal (Flip) | Q: Soco | E: Chute | F: Acenar
        </div>
    </div>
    <div id="loader">Carregando Biblioteca de Animações...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 30, 120);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(-5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(1000, 100, 0x444444, 0x333333));

        let mixer, player, cameraPivot, cameraTarget;
        const actions = {};
        let activeAction;
        const clock = new THREE.Clock();
        const keys = {};

        const loader = new GLTFLoader();

        loader.load('UAL1_Standard.glb', (gltf) => {
            player = gltf.scene;
            player.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            scene.add(player);

            cameraPivot = new THREE.Group();
            cameraPivot.position.set(0, 4, -8);
            player.add(cameraPivot);

            cameraTarget = new THREE.Group();
            cameraTarget.position.set(0, 2, 5);
            player.add(cameraTarget);

            mixer = new THREE.AnimationMixer(player);
            
            gltf.animations.forEach((clip) => {
                const name = clip.name.toLowerCase();
                actions[name] = mixer.clipAction(clip);
                // Configura animações únicas (que não fazem loop)
                if (name.includes('jump') || name.includes('punch') || name.includes('kick') || name.includes('flip')) {
                    actions[name].setLoop(THREE.LoopOnce);
                    actions[name].clampWhenFinished = true;
                }
            });

            activeAction = actions['idle'] || actions['idle_loop'] || Object.values(actions)[0];
            if(activeAction) activeAction.play();

            document.getElementById('loader').style.display = 'none';
        });

        function fadeToAction(name, duration = 0.2) {
            const nextAction = actions[name];
            if (!nextAction || activeAction === nextAction) return;
            nextAction.reset().fadeIn(duration).play();
            activeAction.fadeOut(duration);
            activeAction = nextAction;
        }

        // Sistema de INPUT
        window.addEventListener('keydown', (e) => { keys[e.code] = true; handleInstantActions(e.code); });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function handleInstantActions(code) {
            if (!player) return;
            // Botões de Ação Única
            if (code === 'Space') fadeToAction('jump');
            if (code === 'KeyQ') fadeToAction('punch');
            if (code === 'KeyE') fadeToAction('kick');
            if (code === 'KeyR') fadeToAction('flip'); // Mortal
            if (code === 'KeyF') fadeToAction('wave');
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (player) {
                // Configurações de velocidade
                const isRunning = keys['ShiftLeft'] || keys['ShiftRight'];
                const moveSpeed = isRunning ? 0.3 : 0.12;
                const rotSpeed = 0.05;

                const movingForward = keys['KeyW'];
                const movingBackward = keys['KeyS'];
                const turningLeft = keys['KeyA'];
                const turningRight = keys['KeyD'];
                const isMoving = movingForward || movingBackward || turningLeft || turningRight;

                // Lógica de Troca de Animação de Movimento
                if (activeAction && (activeAction._clip.name.includes('loop') || activeAction._clip.name.includes('idle'))) {
                    if (isMoving) {
                        if (isRunning) fadeToAction('run_loop');
                        else fadeToAction('walk_loop');
                    } else {
                        fadeToAction('idle_loop');
                    }
                }

                // Se uma animação única acabou, volta para o Idle
                if (activeAction && activeAction.paused) {
                    fadeToAction('idle_loop');
                }

                // Movimentação Física
                if (movingForward) player.translateZ(moveSpeed);
                if (movingBackward) player.translateZ(-moveSpeed);
                if (turningLeft) player.rotation.y += rotSpeed;
                if (turningRight) player.rotation.y -= rotSpeed;

                // Câmera Suave
                const goalPos = new THREE.Vector3();
                cameraPivot.getWorldPosition(goalPos);
                const lookPos = new THREE.Vector3();
                cameraTarget.getWorldPosition(lookPos);
                camera.position.lerp(goalPos, 0.1);
                camera.lookAt(lookPos);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
