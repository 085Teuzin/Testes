<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eterna Carta 💌</title>
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --bg: #fdf2f2;
            --text: #4a4a4a;
            --paper: #ffffff;
            --envelope: #f8ad9d;
            --envelope-dark: #f08080;
            --accent: #d63031;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 500px; text-align: center; }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2rem; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px 5px;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-record { background: var(--primary); color: white; }
        .btn-record.recording { background: #ff0000; animation: pulse 1.5s infinite; }
        .btn-send { background: #4CAF50; color: white; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            outline: none;
            transition: 0.3s;
        }

        .visualizer {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin: 10px 0;
        }
        .bar { width: 4px; height: 10px; background: var(--primary); border-radius: 2px; }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--envelope);
            border-radius: 0 0 10px 10px;
            margin: 100px auto 50px;
            cursor: pointer;
            perspective: 1000px;
        }

        .lid {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid var(--envelope-dark);
            transform-origin: top;
            transition: transform 0.6s;
            z-index: 3;
        }

        .letter {
            position: absolute;
            bottom: 10px; left: 10px;
            width: 280px; height: 180px;
            background: white;
            padding: 20px;
            transition: 0.6s 0.2s;
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .envelope-wrapper.open .lid { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .letter { transform: translateY(-130px); height: 250px; }

        .heart-seal {
            position: absolute;
            top: 85px; left: 135px;
            width: 30px; height: 30px;
            background: var(--accent);
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            z-index: 4;
            transition: 0.3s;
        }
        .envelope-wrapper.open .heart-seal { opacity: 0; }

        .hidden { display: none; }
        #share-area { margin-top: 20px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Eterna Carta 💌</h1>

        <div id="create-section" class="card">
            <p>Grave sua voz e escreva sua mensagem.</p>
            <div class="visualizer" id="visualizer"></div>
            <button id="recordBtn" class="btn btn-record">🎙️ Iniciar Gravação</button>
            <audio id="audioPreview" controls class="hidden" style="width:100%; margin-top:10px;"></audio>
            <textarea id="letterText" placeholder="Escreva aqui as palavras que ela vai ler..."></textarea>
            <button id="sendBtn" class="btn btn-send">🎁 Selar e Gerar Link</button>
            <div id="share-area" class="hidden">
                <p>Pronto! Envie este link para ela:</p>
                <input type="text" id="finalUrl" readonly style="width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd;">
            </div>
        </div>

        <div id="receive-section" class="hidden">
            <div class="envelope-wrapper" id="envelope">
                <div class="lid"></div>
                <div class="heart-seal"></div>
                <div class="letter">
                    <p id="display-text" style="font-style: italic; line-height: 1.5;"></p>
                    <button id="playVoice" class="btn btn-record" style="margin-top:20px; font-size: 0.9rem;">🔈 Ouvir Mensagem</button>
                </div>
            </div>
            <p style="margin-top:20px; color: #888;">Toque no envelope para abrir</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getDatabase, ref as dbRef, set, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getDatabase(app);

        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;

        const recordBtn = document.getElementById('recordBtn');
        const sendBtn = document.getElementById('sendBtn');
        const visualizer = document.getElementById('visualizer');

        for(let i=0; i<20; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }

        recordBtn.onclick = async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.textContent = "🎙️ Gravar Novamente";
                recordBtn.classList.remove('recording');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const preview = document.getElementById('audioPreview');
                        preview.src = URL.createObjectURL(audioBlob);
                        preview.classList.remove('hidden');
                        sendBtn.style.display = 'inline-flex';
                    };
                    mediaRecorder.start();
                    recordBtn.textContent = "⏹️ Parar Gravação";
                    recordBtn.classList.add('recording');
                } catch (err) { alert("Acesso ao microfone negado!"); }
            }
        };

        sendBtn.onclick = async () => {
            sendBtn.disabled = true;
            sendBtn.textContent = "⌛ Embalando presente...";
            try {
                const text = document.getElementById('letterText').value;
                const audioName = `audio_${Date.now()}.mp3`;
                const audioRef = ref(storage, 'eterna_carta/' + audioName);
                await uploadBytes(audioRef, audioBlob);
                const audioUrl = await getDownloadURL(audioRef);
                const dbPath = push(dbRef(db, 'cartas'));
                await set(dbPath, { text, audioUrl, timestamp: Date.now() });
                const finalLink = window.location.href.split('?')[0] + '?id=' + dbPath.key;
                document.getElementById('finalUrl').value = finalLink;
                document.getElementById('share-area').classList.remove('hidden');
                sendBtn.textContent = "✅ Pronto!";
            } catch (err) {
                alert("Erro: " + err.message);
                sendBtn.disabled = false;
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const cardId = urlParams.get('id');
        if (cardId) {
            document.getElementById('create-section').classList.add('hidden');
            document.getElementById('receive-section').classList.remove('hidden');
            get(dbRef(db, 'cartas/' + cardId)).then((snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    document.getElementById('display-text').textContent = data.text;
                    const audio = new Audio(data.audioUrl);
                    document.getElementById('envelope').onclick = function() { this.classList.add('open'); };
                    document.getElementById('playVoice').onclick = (e) => { e.stopPropagation(); audio.play(); };
                }
            });
        }
    </script>
</body>
</html>
