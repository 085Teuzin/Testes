<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Write Together - Made By: @085_Teuzinnn</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --text: #333;
            --editor-bg: #fff;
            --accent: #3d3d3d;
            --transition: 0.3s;
            --vh: 1vh;
        }
        .dark-mode {
            --bg: #1a1a1a;
            --text: #f4f1ea;
            --editor-bg: #2d2d2d;
            --accent: #ebca8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: calc(var(--vh, 1vh) * 100);
            display: flex;
            flex-direction: column;
            transition: background var(--transition), color var(--transition);
            /* Garante que o conteúdo não fique sob as barras do sistema */
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Botão Flutuante de Tema */
        #themeBtn {
            position: fixed;
            top: calc(env(safe-area-inset-top, 20px) + 15px);
            right: 20px;
            z-index: 9999;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s active;
        }
        #themeBtn:active { transform: scale(0.9); }

        #setup {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .credits { margin-top: 25px; font-size: 0.85rem; opacity: 0.8; font-weight: bold; }
        h1 { margin-bottom: 30px; font-size: 2.2rem; letter-spacing: -1px; }

        input {
            width: 100%;
            max-width: 320px;
            padding: 18px;
            border: 2px solid #ccc;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            background: #fff;
            outline: none;
            text-align: center;
        }

        .btn-main {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #app {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #editor {
            flex: 1;
            width: 100%;
            border: none;
            padding: 40px 25px;
            font-size: 1.25rem;
            line-height: 1.8;
            font-family: 'Georgia', serif;
            resize: none;
            outline: none;
            background: var(--editor-bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
        }

        #status {
            background: rgba(0,0,0,0.05);
            padding: 12px 25px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        @media (max-height: 500px) {
            h1, .credits { display: none; }
        }
    </style>
</head>
<body>

    <button id="themeBtn" onclick="toggleTheme()">🌙</button>

    <div id="setup">
        <h1>Write Together</h1>
        <input type="text" id="roomName" placeholder="Enter room name...">
        <button class="btn-main" onclick="startSession()">Join Session</button>
        <div class="credits">Made by: @085_Teuzinnm</div>
    </div>

    <div id="app">
        <textarea id="editor" placeholder="Start your story here..."></textarea>
        <div id="status">
            <span id="charCount">0 Caractere</span>
            <span>Sicronizado</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Ajuste dinâmico para evitar que o teclado esconda o layout
        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        window.addEventListener('orientationchange', setVh);
        setVh();

        // As tuas credenciais fornecidas
        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = "";
        const editor = document.getElementById('editor');
        const charDisplay = document.getElementById('charCount');
        const themeBtn = document.getElementById('themeBtn');

        function startSession() {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return;
            currentRoom = name;
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            setVh();
            
            // Conexão com o Firebase para sincronização em tempo real
            db.ref('rooms/' + currentRoom).on('value', (snapshot) => {
                const val = snapshot.val();
                if (val && val.text !== editor.value) {
                    const pos = editor.selectionStart;
                    editor.value = val.text;
                    editor.setSelectionRange(pos, pos);
                    updateStats();
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeBtn.innerText = isDark ? "☀️" : "🌙";
        }

        function updateStats() {
            charDisplay.innerText = `${editor.value.length} characters`;
        }

        editor.addEventListener('input', () => {
            updateStats();
            db.ref('rooms/' + currentRoom).set({
                text: editor.value,
                lastUpdate: Date.now()
            });
        });
    </script>
</body>
</html>
