<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded, remove, onDisconnect, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomID = "130426";
        const myID = Math.random().toString(36).substring(7);
        
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(servers);
        let localStream, timerInterval;

        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const muteBtn = document.getElementById('muteBtn');
        const callTimer = document.getElementById('callTimer');
        const chatNotify = document.getElementById('chatNotify');
        const userIcon = document.getElementById('userIcon');
        let chatOpen = false;

        const playTone = (freq, type = 'sine', dur = 0.1) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + dur);
            } catch(e){}
        };

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                
                setupAudioVisualizer(localStream);

                pc.ontrack = (event) => {
                    const remoteAudio = document.getElementById('remoteAudio');
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play().catch(e => {});
                    startTimer();
                };

                setupPresence();
                startCall();
                setupChat();
            } catch (e) { statusText.innerText = "ERRO MICROFONE"; }
        }

        function setupAudioVisualizer(stream) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;
                source.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    const avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    const scale = 1 + (avg / 120);
                    userIcon.style.transform = `scale(${scale})`;
                }
                draw();
            } catch(e){}
        }

        function startTimer() {
            if (timerInterval) return;
            let seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                callTimer.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function setupPresence() {
            const myPresenceRef = ref(db, `calls/${roomID}/presence/${myID}`);
            const allPresenceRef = ref(db, `calls/${roomID}/presence`);

            set(myPresenceRef, { status: "online", id: myID });
            onDisconnect(myPresenceRef).remove();

            document.addEventListener("visibilitychange", () => {
                set(myPresenceRef, { status: document.hidden ? "away" : "online", id: myID });
            });

            onValue(allPresenceRef, (snap) => {
                const users = snap.val() || {};
                const partner = Object.values(users).find(u => u.id !== myID);

                if (!partner) {
                    statusLed.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                    statusText.innerText = "PAR OFFLINE";
                    clearInterval(timerInterval);
                    timerInterval = null;
                    callTimer.innerText = "00:00";
                } else {
                    const isAway = partner.status === "away";
                    statusLed.className = `w-2.5 h-2.5 rounded-full ${isAway ? 'bg-yellow-500 shadow-[0_0_8px_#eab308]' : 'bg-green-500 shadow-[0_0_8px_#22c55e]'}`;
                    statusText.innerText = isAway ? "PAR AFK" : "PAR ONLINE";
                }
            });
        }

        async function startCall() {
            const signalRef = ref(db, `calls/${roomID}/signal`);
            const offerCandidates = ref(db, `calls/${roomID}/candidates/offer`);
            const answerCandidates = ref(db, `calls/${roomID}/candidates/answer`);

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    const cRef = !pc.remoteDescription ? offerCandidates : answerCandidates;
                    push(cRef, e.candidate.toJSON());
                }
            };

            const snap = await get(signalRef);
            const data = snap.val();

            if (!data || !data.offer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await set(signalRef, { offer: { type: offer.type, sdp: offer.sdp }, timestamp: serverTimestamp() });

                onValue(signalRef, (s) => {
                    const v = s.val();
                    if (v?.answer && !pc.currentRemoteDescription) {
                        pc.setRemoteDescription(new RTCSessionDescription(v.answer));
                    }
                });
                onChildAdded(answerCandidates, (s) => pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e=>{}));
            } else {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await set(ref(db, `calls/${roomID}/signal/answer`), { type: answer.type, sdp: answer.sdp });
                onChildAdded(offerCandidates, (s) => pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e=>{}));
            }
        }

        function setupChat() {
            const chatRef = ref(db, `calls/${roomID}/chat`);
            document.getElementById('sendMsg').onclick = () => {
                const input = document.getElementById('chatInput');
                if (input.value.trim()) {
                    const encrypted = btoa(unescape(encodeURIComponent(input.value)));
                    push(chatRef, { user: myID, msg: encrypted });
                    input.value = "";
                }
            };

            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                let decrypted = "";
                try { decrypted = decodeURIComponent(escape(atob(data.msg))); } catch(e) { decrypted = data.msg; }

                const div = document.createElement('div');
                div.className = `p-2.5 rounded-2xl mb-2 text-[11px] w-fit max-w-[90%] break-all shadow-sm ${data.user === myID ? 'bg-blue-600 ml-auto rounded-tr-none' : 'bg-slate-700 rounded-tl-none'}`;
                div.innerText = decrypted;
                document.getElementById('chatMessages').appendChild(div);
                document.getElementById('chatMessages').scrollTop = 9999;
                
                if (!chatOpen) {
                    chatNotify.classList.remove('hidden');
                    playTone(880, 'triangle', 0.08);
                }
            });
        }

        window.toggleChat = () => {
            chatOpen = !chatOpen;
            document.getElementById('chatContainer').classList.toggle('hidden');
            chatNotify.classList.add('hidden');
        };

        muteBtn.onclick = () => {
            const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            muteBtn.innerHTML = active ? '<span>🎤</span>' : '<span>🔇</span>';
            muteBtn.className = active ? 'flex items-center justify-center p-4 rounded-2xl bg-green-600 shadow-lg' : 'flex items-center justify-center p-4 rounded-2xl bg-red-600 shadow-lg';
        };

        document.getElementById('reconnectBtn').onclick = async () => {
            await remove(ref(db, `calls/${roomID}`));
            location.reload();
        };

        init();
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #userIcon { transition: transform 0.05s ease-out; will-change: transform; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass relative w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl border-b-8 border-slate-900">
        
        <div class="absolute top-6 left-8 flex items-center gap-3">
            <div id="statusLed" class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>
            <div class="flex flex-col">
                <span id="statusText" class="text-[9px] font-black tracking-widest text-slate-500">OFFLINE</span>
                <span id="callTimer" class="text-[10px] font-mono text-blue-400 leading-none">00:00</span>
            </div>
        </div>

        <div id="userIcon" class="w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-full flex items-center justify-center mb-8 shadow-2xl shadow-blue-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
        </div>

        <h1 class="text-xl font-black tracking-tight mb-8 bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Call Direct</h1>

        <div class="grid grid-cols-2 gap-4 w-full">
            <button id="muteBtn" class="flex items-center justify-center p-4 rounded-2xl bg-green-600 hover:scale-105 transition-all shadow-lg text-lg">
                <span>🎤</span>
            </button>
            <button onclick="toggleChat()" class="relative flex items-center justify-center p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all shadow-lg text-lg">
                <span>💬</span>
                <div id="chatNotify" class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-slate-900 hidden"></div>
            </button>
        </div>

        <button id="reconnectBtn" class="mt-6 w-full py-4 bg-slate-800/40 hover:bg-red-600/20 text-slate-400 hover:text-red-400 rounded-2xl font-black text-xs tracking-widest transition-all border border-white/5">
            Reconectar
        </button>

        <div id="chatContainer" class="hidden absolute inset-0 glass rounded-[2.5rem] p-5 flex flex-col z-10 shadow-inner">
            <div class="flex justify-between items-center mb-4 px-2 border-b border-white/5 pb-3">
                <span class="text-[9px] font-black tracking-widest text-blue-500">SECURE CHAT</span>
                <button onclick="toggleChat()" class="text-xl leading-none hover:text-red-500">&times;</button>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 p-2 space-y-3 scrollbar-hide"></div>
            <div class="flex gap-2 p-1 bg-slate-900/50 rounded-2xl border border-white/5">
                <input id="chatInput" type="text" placeholder="Escreva..." class="flex-1 bg-transparent rounded-xl px-3 py-2 text-xs focus:outline-none">
                <button id="sendMsg" class="bg-blue-600 p-2 px-4 rounded-xl text-xs font-bold active:scale-95 transition-transform">➤</button>
            </div>
        </div>
    </div>

    <div class="mt-8">
        <p class="text-slate-700 text-[10px] font-black tracking-[0.3em]">Made By: @085_Teuzinnn</p>
    </div>

    <audio id="remoteAudio" autoplay class="hidden"></audio>
</body>
</html>
