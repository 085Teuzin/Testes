<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game - Quaternius Library</title>
    <style>
        body { margin: 0; outline: none; background: #111; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="loader">Carregando Biblioteca de Animações...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(-5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        scene.add(new THREE.GridHelper(1000, 100, 0x444444, 0x333333));

        let mixer, player, cameraPivot, cameraTarget;
        const actions = {};
        let activeAction;
        const clock = new THREE.Clock();
        const keys = { w: false, a: false, s: false, d: false };

        const loader = new GLTFLoader();

        // USANDO O ARQUIVO GLB DO PACK
        loader.load('UAL1_Standard.glb', (gltf) => {
            player = gltf.scene;
            player.scale.setScalar(1); 
            
            player.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(player);

            cameraPivot = new THREE.Group();
            cameraPivot.position.set(0, 4, -7);
            player.add(cameraPivot);

            cameraTarget = new THREE.Group();
            cameraTarget.position.set(0, 2, 5);
            player.add(cameraTarget);

            mixer = new THREE.AnimationMixer(player);
            
            // Mapeia todas as animações disponíveis no arquivo
            gltf.animations.forEach((clip) => {
                // Remove o prefixo "Armature|" se existir para facilitar
                const name = clip.name.replace('Armature|', '').toLowerCase();
                actions[name] = mixer.clipAction(clip);
                console.log("Animação encontrada:", name);
            });

            // Tenta dar play na Idle ou na primeira que encontrar
            activeAction = actions['idle_loop'] || actions['idle'] || Object.values(actions)[0];
            if(activeAction) activeAction.play();

            document.getElementById('loader').style.display = 'none';
        });

        function fadeToAction(name) {
            let targetAction = actions[name];
            // Caso o nome seja um pouco diferente no pack (ex: Walk_Loop)
            if(!targetAction && name === 'run') targetAction = actions['walk_loop'] || actions['run_loop'];
            if(!targetAction && name === 'idle') targetAction = actions['idle_loop'];

            if (!targetAction || activeAction === targetAction) return;
            targetAction.reset().fadeIn(0.2).play();
            activeAction.fadeOut(0.2);
            activeAction = targetAction;
        }

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (player) {
                const moveSpeed = 0.15;
                const rotSpeed = 0.05;
                const isMoving = keys.w || keys.a || keys.s || keys.d;

                if (isMoving) {
                    fadeToAction('run');
                    if (keys.w) player.translateZ(moveSpeed);
                    if (keys.s) player.translateZ(-moveSpeed);
                    if (keys.a) player.rotation.y += rotSpeed;
                    if (keys.d) player.rotation.y -= rotSpeed;
                } else {
                    fadeToAction('idle');
                }

                const goalPos = new THREE.Vector3();
                cameraPivot.getWorldPosition(goalPos);
                const lookPos = new THREE.Vector3();
                cameraTarget.getWorldPosition(lookPos);
                camera.position.lerp(goalPos, 0.1);
                camera.lookAt(lookPos);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
