<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Third Person Runner</title>
    <style>
        body { margin: 0; outline: none; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Third Person Test</h1>
        <p>W, A, S, D para Correr</p>
    </div>
    <div id="loader">Carregando Recursos...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        scene.fog = new THREE.Fog(0x202020, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(light);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const meshFloor = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 1000),
            new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 })
        );
        meshFloor.rotation.x = -Math.PI / 2;
        meshFloor.receiveShadow = true;
        scene.add(meshFloor);

        const grid = new THREE.GridHelper(1000, 100, 0x444444, 0x444444);
        scene.add(grid);

        let mixer, player;
        const actions = {};
        let activeAction;
        const clock = new THREE.Clock();
        const keys = { w: false, a: false, s: false, d: false };

        const objLoader = new OBJLoader();
        const fbxLoader = new FBXLoader();

        objLoader.load('FinalBaseMesh.obj', (obj) => {
            player = obj;
            player.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.material = new THREE.MeshStandardMaterial({ color: 0x555555 });
                }
            });
            scene.add(player);
            
            mixer = new THREE.AnimationMixer(player);

            fbxLoader.load('Orc Idle.fbx', (anim) => {
                actions['idle'] = mixer.clipAction(anim.animations[0]);
                actions['idle'].play();
                activeAction = actions['idle'];
                document.getElementById('loader').style.display = 'none';
            });

            fbxLoader.load('Medium Run.fbx', (anim) => {
                actions['run'] = mixer.clipAction(anim.animations[0]);
            });
        });

        function fadeToAction(name) {
            if (!actions[name] || activeAction === actions[name]) return;
            actions[name].reset().fadeIn(0.2).play();
            activeAction.fadeOut(0.2);
            activeAction = actions[name];
        }

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (player) {
                const speed = 0.15;
                const rotationSpeed = 0.05;
                const isMoving = keys.w || keys.a || keys.s || keys.d;

                if (isMoving) {
                    fadeToAction('run');
                    if (keys.w) player.translateZ(speed);
                    if (keys.s) player.translateZ(-speed);
                    if (keys.a) player.rotation.y += rotationSpeed;
                    if (keys.d) player.rotation.y -= rotationSpeed;
                } else {
                    fadeToAction('idle');
                }

                const relativeCameraOffset = new THREE.Vector3(0, 3, -8);
                const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
