<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomID = "130426";
        const roomRef = ref(db, `calls/${roomID}`);
        const chatRef = ref(db, `calls/${roomID}/chat`);
        const presenceRef = ref(db, `calls/${roomID}/users`);

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(servers);
        let localStream, remoteStream = new MediaStream();
        let myID = Math.random().toString(36).substring(7);

        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const muteBtn = document.getElementById('muteBtn');
        const chatContainer = document.getElementById('chatContainer');
        const chatNotify = document.getElementById('chatNotify');
        let chatOpen = false;

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                document.getElementById('remoteAudio').srcObject = remoteStream;
                pc.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

                setupPresence();
                handleCallLogic();
                setupChat();
            } catch (e) { statusText.innerText = "Erro ao acessar microfone."; }
        }

        function setupPresence() {
            const myPresence = ref(db, `calls/${roomID}/users/${myID}`);
            onDisconnect(myPresence).remove();
            
            const updateStatus = (s) => set(myPresence, { status: s, last_changed: serverTimestamp() });
            updateStatus("online");

            document.addEventListener("visibilitychange", () => {
                updateStatus(document.hidden ? "away" : "online");
            });

            onValue(presenceRef, (snap) => {
                const users = snap.val() || {};
                const count = Object.keys(users).length;
                const anyAway = Object.values(users).some(u => u.status === "away");

                if (count < 2) {
                    statusLed.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                    statusText.innerText = count === 0 ? "Sala vazia" : "Aguardando par...";
                } else if (anyAway) {
                    statusLed.className = "w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_8px_#eab308]";
                    statusText.innerText = "Alguém saiu da tela";
                } else {
                    statusLed.className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                    statusText.innerText = "Chamada ativa";
                }
            });
        }

        async function handleCallLogic() {
            const snap = await new Promise(r => onValue(roomRef, r, {onlyOnce:true}));
            const data = snap.val();

            if (!data || !data.offer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await set(ref(db, `calls/${roomID}/offer`), {type: offer.type, sdp: offer.sdp});
            } else {
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await set(ref(db, `calls/${roomID}/answer`), {type: answer.type, sdp: answer.sdp});
            }

            pc.onicecandidate = e => {
                if (e.candidate) push(ref(db, `calls/${roomID}/${pc.localDescription.type}Candidates`), e.candidate.toJSON());
            };

            onValue(ref(db, `calls/${roomID}/answer`), snap => {
                if (!pc.currentRemoteDescription && snap.val()) pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            });

            onChildAdded(ref(db, `calls/${roomID}/${pc.localDescription.type === 'offer' ? 'answerCandidates' : 'offerCandidates'}`), snap => {
                pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        function setupChat() {
            document.getElementById('sendMsg').onclick = () => {
                const input = document.getElementById('chatInput');
                if (input.value.trim()) {
                    push(chatRef, { user: myID, msg: input.value, time: serverTimestamp() });
                    input.value = "";
                }
            };

            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.className = `p-2 rounded-lg mb-2 text-xs w-fit max-w-[80%] ${data.user === myID ? 'bg-blue-600 ml-auto' : 'bg-slate-700'}`;
                div.innerText = data.msg;
                document.getElementById('chatMessages').appendChild(div);
                document.getElementById('chatMessages').scrollTop = 9999;
                
                if (!chatOpen) chatNotify.classList.remove('hidden');
            });
        }

        window.toggleChat = () => {
            chatOpen = !chatOpen;
            chatContainer.classList.toggle('hidden');
            chatNotify.classList.add('hidden');
        };

        muteBtn.onclick = () => {
            const active = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            muteBtn.innerHTML = active ? '<span>🎤</span>' : '<span>🔇</span>';
            muteBtn.className = active ? 'flex items-center justify-center p-4 rounded-2xl bg-green-600' : 'flex items-center justify-center p-4 rounded-2xl bg-red-600';
        };

        document.getElementById('hangupBtn').onclick = () => {
            remove(ref(db, `calls/${roomID}/users/${myID}`));
            location.reload();
        };

        init();
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass relative w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl transition-all border-b-4 border-slate-800">
        
        <div class="absolute top-6 left-8 flex items-center gap-2">
            <div id="statusLed" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444] transition-all duration-500"></div>
            <span id="statusText" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Iniciando</span>
        </div>

        <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-full flex items-center justify-center mb-6 shadow-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z" />
            </svg>
        </div>

        <h1 class="text-xl font-bold tracking-tight mb-8">Call Direct</h1>

        <div class="grid grid-cols-2 gap-4 w-full">
            <button id="muteBtn" class="flex items-center justify-center p-4 rounded-2xl bg-green-600 hover:scale-105 transition-all active:scale-95 shadow-lg">
                <span>🎤</span>
            </button>
            <button onclick="toggleChat()" class="relative flex items-center justify-center p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition-all shadow-lg">
                <span>💬</span>
                <div id="chatNotify" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden animate-bounce"></div>
            </button>
        </div>

        <button id="hangupBtn" class="mt-6 w-full py-4 bg-red-500/10 hover:bg-red-500 hover:text-white text-red-500 rounded-2xl font-bold transition-all border border-red-500/20">
            Encerrar Chamada
        </button>

        <div id="chatContainer" class="hidden absolute inset-0 glass rounded-[2.5rem] p-4 flex flex-col z-10">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-xs font-bold text-slate-400">CHAT AO VIVO</span>
                <button onclick="toggleChat()" class="text-lg">&times;</button>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 p-2 space-y-2"></div>
            <div class="flex gap-2">
                <input id="chatInput" type="text" placeholder="Sua mensagem..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500">
                <button id="sendMsg" class="bg-blue-600 px-3 rounded-xl">➤</button>
            </div>
        </div>
    </div>

    <div class="mt-8 flex flex-col items-center gap-1">
        <span class="text-slate-600 text-[10px] font-medium tracking-tighter">DESENVOLVIDO POR</span>
        <span class="text-blue-500 text-xs font-bold opacity-80">@085_Teuzinnn</span>
    </div>

    <audio id="remoteAudio" autoplay class="hidden"></audio>
</body>
</html>
