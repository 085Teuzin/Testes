<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Call Direct Live</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, onValue, push, onChildAdded, remove, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
const firebaseConfig={apiKey:'AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc',authDomain:'teuzin-apps.firebaseapp.com',databaseURL:'https://teuzin-apps-default-rtdb.firebaseio.com',projectId:'teuzin-apps',storageBucket:'teuzin-apps.firebasestorage.app',messagingSenderId:'695505471506',appId:'1:695505471506:web:efe322e605af4a30bfb0cb'};
const app=initializeApp(firebaseConfig); const db=getDatabase(app);
const room='public_room'; const myID=Math.random().toString(36).slice(2); let userName=''; let localStream; let peers={}; let pendingIce={}; const servers={iceServers:[{urls:['stun:stun.l.google.com:19302']}]};
window.addEventListener('load',()=>{const n=localStorage.getItem('cd_name'); if(n) document.getElementById('uName').value=n;});
window.joinPublic=async()=>{userName=document.getElementById('uName').value.trim(); if(!userName)return; localStorage.setItem('cd_name',userName); document.getElementById('lobby').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); await init();};
async function init(){await unlockAudio(); localStream=await navigator.mediaDevices.getUserMedia({audio:true}); const me=ref(db,`rooms/${room}/users/${myID}`); await set(me,{name:userName,id:myID}); onDisconnect(me).remove(); onValue(ref(db,`rooms/${room}/users`),snap=>{const users=snap.val()||{}; document.getElementById('status').textContent=Object.keys(users).length+' online'; Object.keys(users).forEach(id=>{if(id!==myID&&!peers[id]) setTimeout(()=>createPeer(id,true),500);});}); signals(); chat(); timer();}
async function unlockAudio(){const a=new Audio(); try{await a.play();}catch(e){}}
function createPeer(id,offerer){const pc=new RTCPeerConnection(servers); peers[id]=pc; localStream.getTracks().forEach(t=>pc.addTrack(t,localStream)); pc.onicecandidate=e=>{if(e.candidate) push(ref(db,`rooms/${room}/signals/${id}/${myID}/ice`),e.candidate.toJSON());}; pc.ontrack=async e=>{let audio=document.getElementById('a_'+id); if(!audio){audio=document.createElement('audio'); audio.id='a_'+id; audio.autoplay=true; audio.playsInline=true; audio.volume=1; document.body.appendChild(audio);} audio.srcObject=e.streams[0]; try{await audio.play();}catch(err){}}; if(offerer){pc.createOffer().then(o=>pc.setLocalDescription(o).then(()=>set(ref(db,`rooms/${room}/signals/${myID}/${id}/offer`),o)));}}
function signals(){onValue(ref(db,`rooms/${room}/signals/${myID}`),async snap=>{const data=snap.val()||{}; for(const from in data){const d=data[from]; if(d.offer&&!peers[from]){createPeer(from,false); await peers[from].setRemoteDescription(new RTCSessionDescription(d.offer)); const ans=await peers[from].createAnswer(); await peers[from].setLocalDescription(ans); await set(ref(db,`rooms/${room}/signals/${from}/${myID}/answer`),ans); flushIce(from);} if(d.answer&&peers[from]&&!peers[from].currentRemoteDescription){await peers[from].setRemoteDescription(new RTCSessionDescription(d.answer)); flushIce(from);} if(d.ice){Object.values(d.ice).forEach(c=>queueIce(from,c)); remove(ref(db,`rooms/${room}/signals/${myID}/${from}/ice`));}}});}
function queueIce(id,c){if(peers[id]?.remoteDescription) peers[id].addIceCandidate(new RTCIceCandidate(c)).catch(()=>{}); else{pendingIce[id]=pendingIce[id]||[]; pendingIce[id].push(c);}}
function flushIce(id){(pendingIce[id]||[]).forEach(c=>peers[id].addIceCandidate(new RTCIceCandidate(c)).catch(()=>{})); pendingIce[id]=[];}
function chat(){const chatRef=ref(db,`rooms/${room}/chat`); document.getElementById('send').onclick=()=>{const i=document.getElementById('msg'); const v=i.value.trim(); if(!v)return; push(chatRef,{user:userName,id:myID,msg:v,ts:serverTimestamp()}); i.value='';}; onChildAdded(chatRef,s=>{const d=s.val(); const box=document.createElement('div'); box.className='mb-2 text-sm'; box.innerHTML=`<b>${d.user}:</b> ${d.msg}`; const c=document.getElementById('msgs'); c.appendChild(box); c.scrollTop=999999;});}
function timer(){let s=0; setInterval(()=>{s++; const m=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(s%60).padStart(2,'0'); document.getElementById('time').textContent=m+':'+ss;},1000);} window.toggleChat=()=>document.getElementById('chat').classList.toggle('hidden');
</script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
<div id="lobby" class="w-full max-w-sm bg-slate-900 rounded-3xl p-6 space-y-4">
<h1 class="text-2xl font-bold">Call Direct</h1>
<input id="uName" class="w-full p-4 rounded-2xl bg-slate-800" placeholder="Seu nome">
<button onclick="joinPublic()" class="w-full p-4 rounded-2xl bg-blue-600 font-bold">Entrar</button>
</div>
<div id="app" class="hidden w-full max-w-sm bg-slate-900 rounded-3xl p-6 relative">
<div class="flex justify-between text-sm mb-6"><span id="status">0 online</span><span id="time">00:00</span></div>
<div class="w-28 h-28 rounded-full bg-blue-600 mx-auto mb-6"></div>
<button onclick="toggleChat()" class="w-full p-4 rounded-2xl bg-slate-800">Abrir Chat</button>
<div id="chat" class="hidden absolute inset-0 bg-slate-900 rounded-3xl p-4 flex flex-col">
<div class="flex justify-between mb-3"><b>Chat</b><button onclick="toggleChat()">X</button></div>
<div id="msgs" class="flex-1 overflow-y-auto"></div>
<div class="flex gap-2 mt-3"><input id="msg" class="flex-1 p-3 rounded-xl bg-slate-800"><button id="send" class="px-4 rounded-xl bg-blue-600">></button></div>
</div>
</div>
</body>
</html>
