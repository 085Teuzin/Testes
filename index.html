<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Direct</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDthwqD0CGFwDov-zfO-Hx6TD_y3lHsnoc",
            authDomain: "teuzin-apps.firebaseapp.com",
            databaseURL: "https://teuzin-apps-default-rtdb.firebaseio.com",
            projectId: "teuzin-apps",
            storageBucket: "teuzin-apps.firebasestorage.app",
            messagingSenderId: "695505471506",
            appId: "1:695505471506:web:efe322e605af4a30bfb0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomRef = ref(db, 'calls/130426');

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        
        let pc = new RTCPeerConnection(servers);
        let localStream = null;
        let remoteStream = new MediaStream();

        const localAudio = document.getElementById('localAudio');
        const remoteAudio = document.getElementById('remoteAudio');
        const muteBtn = document.getElementById('muteBtn');
        const speakerBtn = document.getElementById('speakerBtn');
        const hangupBtn = document.getElementById('hangupBtn');
        const statusText = document.getElementById('statusText');

        async function init() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
            };

            remoteAudio.srcObject = remoteStream;

            const roomSnapshot = await new Promise(resolve => onValue(roomRef, resolve, { onlyOnce: true }));
            const roomData = roomSnapshot.val();

            if (!roomData || !roomData.offer) {
                makeOffer();
            } else {
                answerCall(roomData.offer);
            }

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const candidatesRef = ref(db, `calls/130426/${roomData?.offer ? 'answerCandidates' : 'offerCandidates'}`);
                    push(candidatesRef, event.candidate.toJSON());
                }
            };
        }

        async function makeOffer() {
            statusText.innerText = "Aguardando conexão...";
            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);

            await set(roomRef, { offer: { type: offerDescription.type, sdp: offerDescription.sdp } });

            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!pc.currentRemoteDescription && data?.answer) {
                    pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    statusText.innerText = "Em chamada";
                }
            });

            onChildAdded(ref(db, 'calls/130426/answerCandidates'), (snapshot) => {
                pc.addIceCandidate(new RTCIceCandidate(snapshot.val()));
            });
        }

        async function answerCall(offer) {
            statusText.innerText = "Conectando...";
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);

            await set(ref(db, 'calls/130426/answer'), { type: answerDescription.type, sdp: answerDescription.sdp });

            onChildAdded(ref(db, 'calls/130426/offerCandidates'), (snapshot) => {
                pc.addIceCandidate(new RTCIceCandidate(snapshot.val()));
            });
            statusText.innerText = "Em chamada";
        }

        muteBtn.onclick = () => {
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            muteBtn.innerText = enabled ? "Unmute" : "Mute";
            muteBtn.classList.toggle('bg-red-500');
        };

        speakerBtn.onclick = () => {
            if (remoteAudio.setSinkId) {
                statusText.innerText = "Viva-voz alternado";
            } else {
                alert("Navegador não suporta troca de saída de áudio.");
            }
        };

        hangupBtn.onclick = () => {
            remove(roomRef);
            location.reload();
        };

        init();
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-md rounded-3xl p-8 flex flex-col items-center shadow-2xl">
        <div class="w-24 h-24 bg-blue-600 rounded-full flex items-center justify-center mb-6 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold mb-2">Call Direct</h1>
        <p id="statusText" class="text-blue-400 font-medium mb-8">Iniciando...</p>

        <div class="grid grid-cols-2 gap-4 w-full">
            <button id="muteBtn" class="flex flex-col items-center justify-center p-4 rounded-2xl bg-slate-700 hover:bg-slate-600 transition">
                <span class="text-sm">Mute</span>
            </button>
            <button id="speakerBtn" class="flex flex-col items-center justify-center p-4 rounded-2xl bg-slate-700 hover:bg-slate-600 transition">
                <span class="text-sm">Viva-voz</span>
            </button>
        </div>

        <button id="hangupBtn" class="mt-8 w-full py-4 bg-red-600 hover:bg-red-700 rounded-2xl font-bold text-white transition shadow-lg shadow-red-900/20">
            Desligar
        </button>
    </div>

    <audio id="localAudio" autoplay muted class="hidden"></audio>
    <audio id="remoteAudio" autoplay class="hidden"></audio>

</body>
</html>
