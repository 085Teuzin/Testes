<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>​Sinfonia de Estantes - By: @085_Teuzinnn</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root {
            --leather: #3d1c10;
            --paper: #f4e4bc;
            --ink: #2b2b2b;
            --gold: #c5a059;
            --gold-dark: #8a6d3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #121212;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Crimson Pro', serif;
        }

        .safe-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .book-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 1000px;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cover, .back-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--leather) url('https://www.transparenttextures.com/patterns/leather.png');
            border-radius: 4px 12px 12px 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            z-index: 10;
            transition: transform 1.2s cubic-bezier(0.6, 0, 0.4, 1);
            transform-origin: left;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back-cover {
            z-index: 1;
            transform: rotateY(0deg);
        }

        .cover-border {
            width: 88%;
            height: 92%;
            border: 1px solid var(--gold);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .corner { position: absolute; color: var(--gold); font-size: 1.2rem; }
        .tl { top: 10px; left: 10px; }
        .tr { top: 10px; right: 10px; transform: rotate(90deg); }
        .bl { bottom: 10px; left: 10px; transform: rotate(-90deg); }
        .br { bottom: 10px; right: 10px; transform: rotate(180deg); }

        .cover h1 {
            font-family: 'UnifrakturMaguntia', cursive;
            color: var(--gold);
            font-size: clamp(2.2rem, 10vw, 3.5rem);
            text-align: center;
        }

        .divider {
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px 0;
        }

        .page {
            position: absolute;
            width: 99%;
            height: 99%;
            background: var(--paper) url('https://www.transparenttextures.com/patterns/parchment.png');
            padding: 40px 25px;
            border-radius: 0 10px 10px 0;
            box-shadow: inset 25px 0 50px rgba(0,0,0,0.25);
            color: var(--ink);
            z-index: 5;
            display: flex;
            flex-direction: column;
            transform-origin: left;
            visibility: hidden;
        }

        .book-container.open .page { visibility: visible; }
        .book-container.open .cover { transform: rotateY(-165deg); }
        .book-container.at-back .page { visibility: hidden; }

        #content { overflow-y: auto; flex: 1; }
        h2 { font-family: 'UnifrakturMaguntia', cursive; text-align: center; margin-bottom: 20px; font-size: 1.8rem; color: #4a2c1d; }
        p { margin-bottom: 18px; text-align: justify; line-height: 1.8; font-size: 1.2rem; }

        .credits-list { list-style: none; text-align: center; color: var(--gold); font-family: serif; }
        .credits-list li { margin: 15px 0; letter-spacing: 1px; }
        .credits-list b { display: block; font-size: 0.7rem; color: var(--gold-dark); text-transform: uppercase; margin-bottom: 5px; }

        .page-flip { animation: flipEffect 0.5s ease-in-out; }
        @keyframes flipEffect { 0% { opacity: 0.8; transform: translateX(5px); } 100% { opacity: 1; transform: translateX(0); } }

        #pg-indicator { text-align: center; font-size: 0.8rem; margin-top: 10px; opacity: 0.4; }
    </style>
</head>
<body>

    <audio id="snd-cover" src="grosso.mp3" preload="auto"></audio>
    <audio id="snd-page" src="folhando.mp3" preload="auto"></audio>

    <div class="safe-wrapper">
        <div class="book-container" id="book">
            
            <div class="back-cover" id="backCover">
                <div class="cover-border">
                    <div class="corner tl">✦</div><div class="corner tr">✦</div>
                    <div class="corner bl">✦</div><div class="corner br">✦</div>
                    <h2 style="color: var(--gold); border: none;">Créditos</h2>
                    <div class="divider"></div>
                    <ul class="credits-list">
                        <li><b>Autor & Roteiro</b> @085_Teuzinnn</li>
                        <li><b>Desenvolvimento</b> Gemini AI</li>
                        <li><b>Interface</b> HTML5 / CSS3 / JS</li>
                        <li><b>Localização</b> Brasil</li>
                    </ul>
                    <p style="color: var(--gold-dark); font-size: 0.6rem; margin-top: 40px;">© 2026 ​Sinfonia de Estantes<br>All Rights Reserved</p>
                </div>
            </div>

            <div class="page" id="pageLayer">
                <div id="content"></div>
                <div id="pg-indicator"></div>
            </div>

            <div class="cover" id="frontCover">
                <div class="cover-border">
                    <div class="corner tl">✦</div><div class="corner tr">✦</div>
                    <div class="corner bl">✦</div><div class="corner br">✦</div>
                    <h1>​Sinfonia de Estantes</h1>
                    <div class="divider"></div>
                    <p style="color: var(--gold); letter-spacing: 5px; font-size: 0.8rem;">LIVRO ORIGINAL</p>
                </div>
            </div>

        </div>
    </div>

    <script src="capitulos.js"></script>

    <script>
        let currentIndex = 0;
        let pages = [];
        let touchStartX = 0;
        let touchEndX = 0;
        const book = document.getElementById('book');
        const content = document.getElementById('content');
        const sndCover = document.getElementById('snd-cover');
        const sndPage = document.getElementById('snd-page');

        function playSnd(type) {
            const s = type === 'cover' ? sndCover : sndPage;
            s.currentTime = 0;
            s.play().catch(()=>{});
        }

        function init() {
            if (typeof rawText !== 'undefined') {
                pages = rawText.split('___').map(p => p.trim()).filter(p => p.length > 0);
                render();
            }
        }

        function render() {
            content.classList.remove('page-flip');
            void content.offsetWidth;
            content.classList.add('page-flip');
            content.innerHTML = pages[currentIndex];
            document.getElementById('pg-indicator').innerText = `Página ${currentIndex + 1} de ${pages.length}`;
            content.scrollTop = 0;
        }

        function handleSwipe() {
            const threshold = 50;
            const swipeL = touchStartX - touchEndX > threshold;
            const swipeR = touchEndX - touchStartX > threshold;

            if (!book.classList.contains('open')) {
                if (swipeL) {
                    book.classList.add('open');
                    book.classList.remove('at-back');
                    currentIndex = 0;
                    render();
                    playSnd('cover');
                }
            } else if (book.classList.contains('at-back')) {
                if (swipeR) {
                    book.classList.remove('at-back');
                    currentIndex = pages.length - 1;
                    render();
                    playSnd('page');
                } else if (swipeL) {
                    book.classList.remove('open');
                    book.classList.remove('at-back');
                    playSnd('cover');
                }
            } else {
                if (swipeL) {
                    if (currentIndex < pages.length - 1) {
                        currentIndex++;
                        render();
                        playSnd('page');
                    } else {
                        book.classList.add('at-back');
                        playSnd('page');
                    }
                } else if (swipeR) {
                    if (currentIndex > 0) {
                        currentIndex--;
                        render();
                        playSnd('page');
                    } else {
                        book.classList.remove('open');
                        playSnd('cover');
                    }
                }
            }
        }

        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); });
        window.onload = init;
    </script>
</body>
</html>
